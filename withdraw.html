<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - TaskEarn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💸 Withdraw Money</h1>

    <div class="card">

        <h2>Available Balance</h2>

        <h1 id="withdrawWallet">₹0</h1>

    </div>

    <input
        type="text"
        id="upiId"
        placeholder="Enter Your UPI ID"
    >

    <input
        type="number"
        id="withdrawAmount"
        placeholder="Enter Amount"
    >

    <button id="withdrawNowBtn">
        Request Withdraw
    </button>

    <div class="card">

        <button id="backDashboardBtn">
            🏠 Back to Dashboard
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
