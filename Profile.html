<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TaskEarn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>👤 My Profile</h1>

    <div class="card" style="text-align:center;">

        <img
        src="https://ui-avatars.com/api/?name=User&background=22c55e&color=ffffff&size=180"
        width="120"
        height="120"
        alt="Profile">

        <h2 id="profileName">Loading...</h2>

        <p id="profileEmail">Loading...</p>

    </div>

    <div class="card">

        <h2>💰 Wallet Balance</h2>

        <h1 id="profileWallet">₹0</h1>

    </div>

    <div class="card">

        <button id="editProfileBtn">
            ✏️ Edit Profile
        </button>

    </div>

    <div class="card">

        <button id="backDashboardBtn">
            🏠 Back to Dashboard
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
