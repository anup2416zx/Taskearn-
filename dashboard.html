<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskEarn</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 id="welcome">👋 Welcome</h1>

    <p id="userEmail"></p>

    <!-- Profile -->
    <div class="card">
        <h2>👤 My Profile</h2>

        <button id="profileBtn">
            Open Profile
        </button>
    </div>

    <!-- Wallet -->
    <div class="card">

        <h2>💰 Wallet Balance</h2>

        <h1 id="wallet">₹0</h1>

    </div>

    <!-- Daily Task -->
    <div class="card">

        <h2>🎯 Daily Task</h2>

        <button id="taskBtn">
            Complete Daily Task (+₹5)
        </button>

    </div>

    <!-- Withdraw -->
    <div class="card">

        <h2>💸 Withdraw</h2>

        <button id="withdrawBtn">
            Withdraw Money
        </button>

    </div>

    <!-- Logout -->
    <div class="card">

        <button id="logoutBtn">
            🚪 Logout
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
